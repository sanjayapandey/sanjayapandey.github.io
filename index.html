<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjaya Pandey | Portfolio</title>
    <!-- Tailwind or Bootstrap can be kept, but we use custom CSS for the full-page layout -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        /* Full page viewer wrapper */
        #portfolio-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* For 3D transitions if desired */
        }

        /* The canvas wrapper holding the pages */
        .page-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1200px; /* Keeps landscape portfolios looking sharp */
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
            border-radius: 4px;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
        }

        /* Animation classes */
        .slide-out-left {
            transform: translateX(-120%) rotateY(-15deg);
            opacity: 0;
        }

        .slide-out-right {
            transform: translateX(120%) rotateY(15deg);
            opacity: 0;
        }

        .slide-in-left {
            animation: slideInLeft 0.6s forwards cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide-in-right {
            animation: slideInRight 0.6s forwards cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%) rotateY(-15deg); opacity: 0; }
            to { transform: translateX(0) rotateY(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%) rotateY(15deg); opacity: 0; }
            to { transform: translateX(0) rotateY(0); opacity: 1; }
        }

        /* Navigation Floating UI */
        .nav-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-info {
            color: #ccc;
            font-size: 0.9rem;
            user-select: none;
        }

        /* Quick loading indicator */
        #loader {
            position: absolute;
            color: white;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="portfolio-container">
        <div id="loader">Loading Portfolio...</div>
        <div class="page-viewport">
            <canvas id="pdf-canvas"></canvas>
        </div>
        
        <!-- Controls Floating Bar -->
        <div class="nav-overlay" style="display: none;">
            <button class="nav-btn" id="prev-btn">◀ Prev</button>
            <span class="page-info">Page <span id="page-num">1</span> of <span id="page-count">0</span></span>
            <button class="nav-btn" id="next-btn">Next ▶</button>
        </div>
    </div>

    <script>
        // Points to the PDF uploaded directly in your root directory
        const url = './Sanjaya Pandey.pdf'; 

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumPending = null;

        const scale = 1.5,
              canvas = document.getElementById('pdf-canvas'),
              ctx = canvas.getContext('2d'),
              loader = document.getElementById('loader'),
              navOverlay = document.querySelector('.nav-overlay');

        // Render the page
        const renderPage = num => {
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderCtx = {
                    canvasContext: ctx,
                    viewport: viewport
                };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;

                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });

                // Update page counters
                document.getElementById('page-num').textContent = num;
            });
        };

        // Check for pages rendering and trigger animations
        const queueRenderPage = (num, direction) => {
            const canvasEl = document.getElementById('pdf-canvas');
            
            // Step A: Apply slide-out animation to current canvas
            if (direction === 'next') {
                canvasEl.className = 'slide-out-left';
            } else if (direction === 'prev') {
                canvasEl.className = 'slide-out-right';
            }

            // Step B: Wait for the slide-out to finish, render the new page, and slide it in
            setTimeout(() => {
                if (pageIsRendering) {
                    pageNumPending = num;
                } else {
                    renderPage(num);
                }

                // Apply corresponding entry slide animation
                if (direction === 'next') {
                    canvasEl.className = 'slide-in-right';
                } else if (direction === 'prev') {
                    canvasEl.className = 'slide-in-left';
                }
            }, 300); // Matches CSS transition duration halfway
        };

        // Show Previous Page
        const showPrevPage = () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum, 'prev');
        };

        // Show Next Page
        const showNextPage = () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum, 'next');
        };

        // Load Document
        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;

            loader.style.display = 'none';
            navOverlay.style.display = 'flex';

            renderPage(pageNum);
        }).catch(err => {
            loader.textContent = "Error loading PDF portfolio.";
            console.error(err);
        });

        // Button Events
        document.getElementById('prev-btn').addEventListener('click', showPrevPage);
        document.getElementById('next-btn').addEventListener('click', showNextPage);

        // Keyboard Arrow Navigation
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') showNextPage();
            if (e.key === 'ArrowLeft') showPrevPage();
        });
    </script>
</body>
</html>
